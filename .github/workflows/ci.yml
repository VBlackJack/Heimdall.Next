name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        env:
          THEMEFORGE_PACKAGES_TOKEN: ${{ secrets.THEMEFORGE_PACKAGES_TOKEN }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ..\.offline-nuget | Out-Null
          dotnet restore Heimdall.slnx

      - name: Check code formatting
        run: dotnet format Heimdall.slnx --no-restore --verify-no-changes --verbosity diagnostic

      - name: Build
        env:
          THEMEFORGE_PACKAGES_TOKEN: ${{ secrets.THEMEFORGE_PACKAGES_TOKEN }}
        run: dotnet build Heimdall.slnx --no-restore -c Release

      - name: Test with coverage
        env:
          THEMEFORGE_PACKAGES_TOKEN: ${{ secrets.THEMEFORGE_PACKAGES_TOKEN }}
        run: >
          dotnet test Heimdall.slnx --no-build -c Release
          --filter "Category!=CIUnstable"
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      # Informational pass for tests tagged CIUnstable. These pass on dev
      # machines but flake on the GitHub Actions Windows runner due to
      # named-pipe handshake / WPF binding propagation latency. We surface
      # the result as a workflow warning instead of failing the build, so
      # the signal stays visible without blocking PRs. See
      # docs/CI_FLAKY_TESTS.md for the rationale and the per-test list.
      - name: Test CIUnstable (informational, non-blocking)
        if: always()
        continue-on-error: true
        env:
          THEMEFORGE_PACKAGES_TOKEN: ${{ secrets.THEMEFORGE_PACKAGES_TOKEN }}
        run: >
          dotnet test Heimdall.slnx --no-build -c Release
          --filter "Category=CIUnstable"
          --verbosity normal
          --results-directory TestResults/CIUnstable

      - name: Check for vulnerable dependencies
        shell: pwsh
        env:
          THEMEFORGE_PACKAGES_TOKEN: ${{ secrets.THEMEFORGE_PACKAGES_TOKEN }}
        # Informational only — emits a workflow warning instead of failing the
        # build, since vulnerability databases occasionally include false
        # positives or advisories without an upgrade path. Maintainers should
        # review the warning and act accordingly.
        run: |
          $report = dotnet list Heimdall.slnx package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $report
          if ($report -match "has the following vulnerable packages") {
            Write-Host "::warning::Vulnerable dependencies detected - see output above"
          } else {
            Write-Host "No vulnerable dependencies detected."
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 30

      - name: Validate JSON locales
        shell: pwsh
        run: |
          $en = Get-Content locales/en.json -Raw | ConvertFrom-Json
          $fr = Get-Content locales/fr.json -Raw | ConvertFrom-Json
          $enKeys = ($en.PSObject.Properties | Measure-Object).Count
          $frKeys = ($fr.PSObject.Properties | Measure-Object).Count
          Write-Host "EN: $enKeys keys, FR: $frKeys keys"
          if ($enKeys -ne $frKeys) { throw "i18n key parity mismatch: EN=$enKeys FR=$frKeys" }
          $enSorted = $en.PSObject.Properties.Name | Sort-Object
          $frSorted = $fr.PSObject.Properties.Name | Sort-Object
          $diff = Compare-Object $enSorted $frSorted
          if ($diff) {
            $diff | ForEach-Object { Write-Host "$($_.SideIndicator) $($_.InputObject)" }
            throw "i18n key sets differ"
          }
          Write-Host "i18n parity OK ($enKeys keys)"
