<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B5DE5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D44"/>
      <stop offset="100%" style="stop-color:#1E1E2E"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M256 28 L462 100 C462 100 472 310 256 484 C40 310 50 100 50 100 Z"
        fill="url(#shieldGrad)" stroke="none"/>

  <!-- Inner shield -->
  <path d="M256 60 L432 120 C432 120 440 300 256 450 C72 300 80 120 80 120 Z"
        fill="url(#innerGrad)" stroke="none"/>

  <!-- Connection symbol: three dots with connecting lines (represents RDP/SSH/SFTP) -->
  <!-- Central eye (Heimdall's all-seeing eye) -->
  <ellipse cx="256" cy="220" rx="80" ry="50" fill="none" stroke="#7C3AED" stroke-width="8"/>
  <circle cx="256" cy="220" r="24" fill="#7C3AED"/>
  <circle cx="256" cy="220" r="10" fill="#F0F0F0"/>

  <!-- Three connection rays below the eye -->
  <line x1="180" y1="300" x2="220" y2="340" stroke="#22C55E" stroke-width="6" stroke-linecap="round"/>
  <circle cx="172" cy="294" r="8" fill="#22C55E"/>

  <line x1="256" y1="290" x2="256" y2="340" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="284" r="8" fill="#3B82F6"/>

  <line x1="332" y1="300" x2="292" y2="340" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>
  <circle cx="340" cy="294" r="8" fill="#F59E0B"/>

  <!-- Terminal prompt at bottom -->
  <text x="218" y="370" font-family="Consolas,monospace" font-size="36" font-weight="bold" fill="#F0F0F0">H&gt;_</text>
</svg>
