<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="drawio-frame"></iframe>
    <script>
        var currentXml = '';
        var frame = document.getElementById('drawio-frame');
        var editorReady = false;
        var autosaveTimer = null;

        // Listen for messages from draw.io iframe (embed protocol)
        window.addEventListener('message', function(evt) {
            if (evt.data && typeof evt.data === 'string') {
                try {
                    var msg = JSON.parse(evt.data);
                    handleDrawioMessage(msg);
                } catch(e) {}
            }
        });

        function handleDrawioMessage(msg) {
            switch(msg.event) {
                case 'init':
                    editorReady = true;
                    // draw.io is ready — load initial XML if available
                    if (currentXml) {
                        frame.contentWindow.postMessage(JSON.stringify({
                            action: 'load',
                            xml: currentXml,
                            autosave: 1
                        }), '*');
                    }
                    // Start periodic autosave
                    startAutosave();
                    break;

                case 'autosave':
                case 'save':
                    // Send saved XML to C# host
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage('save:' + msg.xml);
                    }
                    break;

                case 'export':
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage('export:' + msg.data);
                    }
                    break;

                case 'exit':
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage('exit:');
                    }
                    break;
            }
        }

        // Periodically extract XML from the editor for autosave
        function startAutosave() {
            if (autosaveTimer) return;
            autosaveTimer = setInterval(function() {
                try {
                    var editorUi = frame.contentWindow && frame.contentWindow.geApplication
                        ? frame.contentWindow.geApplication.editor
                        : null;
                    if (!editorUi) return;
                    var graph = editorUi.graph;
                    if (!graph) return;
                    var enc = new frame.contentWindow.mxCodec();
                    var node = enc.encode(graph.getModel());
                    var xml = frame.contentWindow.mxUtils.getXml(node);
                    if (xml && window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage('save:' + xml);
                    }
                } catch(e) {
                    // Editor not yet fully initialized or API unavailable
                }
            }, 3000);
        }

        // Listen for messages from C# host
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', function(evt) {
                var msg = evt.data;
                if (typeof msg !== 'string') return;

                if (msg.indexOf('load:') === 0) {
                    currentXml = msg.substring(5);
                    if (editorReady) {
                        frame.contentWindow.postMessage(JSON.stringify({
                            action: 'load',
                            xml: currentXml,
                            autosave: 1
                        }), '*');
                    }
                    return;
                }

                if (msg === 'export-png:') {
                    frame.contentWindow.postMessage(JSON.stringify({
                        action: 'export',
                        format: 'png',
                        spinKey: 'export'
                    }), '*');
                    return;
                }

                if (msg === 'export-svg:') {
                    frame.contentWindow.postMessage(JSON.stringify({
                        action: 'export',
                        format: 'svg',
                        spinKey: 'export'
                    }), '*');
                    return;
                }
            });

            window.chrome.webview.postMessage('ready:');
        }

        // Load draw.io in embed mode with full menu bar.
        // embed=1: required for the postMessage protocol (init/save/export events)
        // menubar=1: re-enables the menu bar hidden by default in embed mode
        // noSaveBtn=1 & noExitBtn=1: hide embed-mode buttons (Heimdall has its own)
        // saveAndExit=0: prevent "Save & Exit" prompt
        frame.src = 'index.html?embed=1&menubar=1&proto=json&spin=1&libraries=1&ui=dark&noSaveBtn=1&noExitBtn=1&saveAndExit=0';
    </script>
</body>
</html>
