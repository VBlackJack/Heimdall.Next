<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; font-src data:; img-src data:; connect-src 'none'; frame-src 'none';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heimdall Terminal</title>
    <style>
        :root {
            --terminal-bg: /*{{CSS_BG}}*/;
            --terminal-fg: /*{{CSS_FG}}*/;
            --terminal-cursor: /*{{CSS_CURSOR}}*/;
            --terminal-selection: /*{{CSS_SELECTION}}*/;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--terminal-bg);
            color: var(--terminal-fg);
            font-family: /*{{TERMINAL_FONT_FAMILY}}*/, 'Courier New', monospace;
        }

        body {
            display: flex;
        }

        #terminal {
            width: 100%;
            height: 100%;
            background: var(--terminal-bg);
            border: 0;
        }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--terminal-bg);
            color: rgba(248, 248, 242, 0.72);
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        /* Search bar overlay */
        #search-bar {
            display: none;
            position: absolute;
            top: 4px;
            right: 12px;
            z-index: 100;
            background: #44475A;
            border: 1px solid #6272A4;
            border-radius: 6px;
            padding: 4px 8px;
            align-items: center;
            gap: 4px;
        }

        #search-bar.visible {
            display: flex;
        }

        #search-input {
            background: #282A36;
            color: #F8F8F2;
            border: 1px solid #6272A4;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 12px;
            font-family: Consolas, monospace;
            width: 220px;
            outline: none;
        }

        #search-input:focus {
            border-color: #BD93F9;
        }

        .search-btn {
            background: #44475A;
            color: #F8F8F2;
            border: 1px solid #6272A4;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .search-btn:hover {
            background: #6272A4;
        }

        .xterm,
        .xterm .xterm-screen,
        .xterm .xterm-viewport {
            background: var(--terminal-bg);
        }

        .xterm {
            height: 100%;
            padding: 4px;
        }

        /* Dracula-themed scrollbar for xterm viewport */
        .xterm .xterm-viewport::-webkit-scrollbar {
            width: 10px;
        }
        .xterm .xterm-viewport::-webkit-scrollbar-track {
            background: #282A36;
        }
        .xterm .xterm-viewport::-webkit-scrollbar-thumb {
            background: #44475A;
            border-radius: 5px;
        }
        .xterm .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: #6272A4;
        }
    </style>
    <link rel="stylesheet" href="./Terminal/xterm.min.css" />
    <script src="./Terminal/xterm.min.js"></script>
    <script src="./Terminal/addon-fit.min.js"></script>
    <script src="./Terminal/addon-webgl.min.js"></script>
</head>
<body>
    <div id="loading">Initializing terminal&#x2026;</div>
    <div id="search-bar">
        <input id="search-input" type="text" placeholder="Search..." />
        <button class="search-btn" id="search-prev">&#x25B2;</button>
        <button class="search-btn" id="search-next">&#x25BC;</button>
        <button class="search-btn" id="search-close">&#x2715;</button>
    </div>
    <div id="terminal"></div>
    <script>
        (function () {
            'use strict';

            var terminalElement = document.getElementById('terminal');
            var loadingElement = document.getElementById('loading');
            var searchBar = document.getElementById('search-bar');
            var searchInput = document.getElementById('search-input');
            var term = null;
            var fitAddon = null;
            var searchAddon = null;
            var ready = false;
            var pendingHostMessages = [];
            var pendingResizeHandle = 0;
            var baseFontSize = /*{{TERMINAL_FONT_SIZE}}*/;
            var currentFontSize = baseFontSize;

            function postMessage(message) {
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage(message);
                }
            }

            function bytesToBase64(bytes) {
                var binary = '';
                for (var index = 0; index < bytes.length; index++) {
                    binary += String.fromCharCode(bytes[index]);
                }
                return btoa(binary);
            }

            function base64ToBytes(base64) {
                var binary = atob(base64);
                var bytes = new Uint8Array(binary.length);
                for (var index = 0; index < binary.length; index++) {
                    bytes[index] = binary.charCodeAt(index);
                }
                return bytes;
            }

            function stringToBase64(text) {
                return bytesToBase64(new TextEncoder().encode(text));
            }

            function fitTerminal() {
                if (!fitAddon || !term) {
                    return;
                }
                fitAddon.fit();
                postMessage('resize:' + term.cols + ',' + term.rows);
            }

            function setFontSize(size) {
                size = Math.max(8, Math.min(28, size));
                currentFontSize = size;
                term.options.fontSize = size;
                fitTerminal();
            }

            // ── Search ──────────────────────────────────────────────
            function toggleSearch() {
                if (searchBar.classList.contains('visible')) {
                    closeSearch();
                } else {
                    searchBar.classList.add('visible');
                    searchInput.focus();
                    searchInput.select();
                }
            }

            function closeSearch() {
                searchBar.classList.remove('visible');
                if (searchAddon) {
                    searchAddon.clearDecorations();
                }
                term.focus();
            }

            function doSearch(direction) {
                if (!term || !searchInput.value) return;
                // Use the browser's built-in find for scrollback search
                // xterm.js exposes buffer contents that we can search through
                var query = searchInput.value.toLowerCase();
                var buffer = term.buffer.active;
                var found = false;
                var startLine = direction === 'prev' ? buffer.viewportY - 1 : buffer.viewportY + 1;
                var step = direction === 'prev' ? -1 : 1;
                for (var i = startLine; i >= 0 && i < buffer.length; i += step) {
                    var line = buffer.getLine(i);
                    if (line && line.translateToString().toLowerCase().indexOf(query) >= 0) {
                        term.scrollToLine(Math.max(0, i - 5));
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    searchInput.style.borderColor = '#FF5555';
                    setTimeout(function() { searchInput.style.borderColor = '#6272A4'; }, 1000);
                }
            }

            // ── Host message handling ────────────────────────────────
            function handleHostMessage(message) {
                if (!term || typeof message !== 'string') {
                    return;
                }

                if (message.indexOf('data:') === 0) {
                    window.writeTerminal(message.substring(5));
                    return;
                }

                if (message.indexOf('clipboard-paste:') === 0) {
                    var pasteB64 = message.substring('clipboard-paste:'.length);
                    if (pasteB64) {
                        var pasteText = new TextDecoder().decode(base64ToBytes(pasteB64));
                        postMessage('input:' + stringToBase64(pasteText));
                    }
                    return;
                }

                if (message.indexOf('session-ended:') === 0) {
                    term.write('\r\n\x1b[90m--- Session ended ---\x1b[0m\r\n');
                    term.options.disableStdin = true;
                    return;
                }

                if (message.indexOf('focus:') === 0) {
                    term.focus();
                }
            }

            function flushPendingHostMessages() {
                if (!ready) {
                    return;
                }
                while (pendingHostMessages.length > 0) {
                    handleHostMessage(pendingHostMessages.shift());
                }
            }

            // ── Terminal initialization ──────────────────────────────
            function initializeTerminal() {
                term = new Terminal({
                    allowProposedApi: true,
                    cursorBlink: true,
                    cursorStyle: 'block',
                    fontFamily: '/*{{TERMINAL_FONT_FAMILY}}*/, "Courier New", monospace',
                    fontSize: baseFontSize,
                    scrollback: 10000,
                    linkHandler: {
                        activate: function (event, uri) {
                            postMessage('open-url:' + uri);
                        }
                    },
                    theme: /*{{TERMINAL_THEME}}*/
                });

                fitAddon = new FitAddon.FitAddon();
                term.loadAddon(fitAddon);

                // Search: use xterm.js built-in findNext/findPrevious if available
                searchAddon = term;

                try {
                    var webglAddon = new WebglAddon.WebglAddon();
                    webglAddon.onContextLoss(function () {
                        webglAddon.dispose();
                    });
                    term.loadAddon(webglAddon);
                }
                catch (error) {
                    // Canvas fallback is acceptable.
                }

                term.open(terminalElement);
                fitTerminal();
                loadingElement.style.display = 'none';

                // ── Input handling ───────────────────────────────────
                term.onData(function (data) {
                    postMessage('input:' + stringToBase64(data));
                });

                term.onResize(function (size) {
                    postMessage('resize:' + size.cols + ',' + size.rows);
                });

                // ── Selection auto-copy (via C# host for clipboard access) ──
                term.onSelectionChange(function () {
                    var selection = term.getSelection();
                    if (selection && selection.length > 0) {
                        postMessage('clipboard-write:' + stringToBase64(selection));
                    }
                });

                // ── Keyboard shortcuts ──────────────────────────────
                term.attachCustomKeyEventHandler(function (event) {
                    if (event.type !== 'keydown') return true;

                    // Tab: prevent browser focus navigation, let xterm.js send \t to terminal
                    // This is critical for PowerShell/bash tab completion
                    if (event.key === 'Tab') {
                        event.preventDefault();
                        return true;
                    }

                    // Ctrl+Shift+C: explicit copy
                    if (event.ctrlKey && event.shiftKey && event.code === 'KeyC') {
                        var sel = term.getSelection();
                        if (sel) postMessage('clipboard-write:' + stringToBase64(sel));
                        return false;
                    }

                    // Ctrl+Shift+V or Ctrl+V: paste from host clipboard
                    if (event.ctrlKey && (event.code === 'KeyV')) {
                        postMessage('clipboard-read:');
                        return false;
                    }

                    // Ctrl+Shift+F: search
                    if (event.ctrlKey && event.shiftKey && event.code === 'KeyF') {
                        toggleSearch();
                        return false;
                    }

                    // Ctrl++ / Ctrl+-: font zoom
                    if (event.ctrlKey && !event.shiftKey && (event.key === '+' || event.key === '=')) {
                        setFontSize(currentFontSize + 1);
                        return false;
                    }
                    if (event.ctrlKey && !event.shiftKey && event.key === '-') {
                        setFontSize(currentFontSize - 1);
                        return false;
                    }
                    if (event.ctrlKey && event.key === '0') {
                        setFontSize(baseFontSize);
                        return false;
                    }

                    return true;
                });

                // ── Mouse wheel zoom (Ctrl+Scroll) ─────────────────
                terminalElement.addEventListener('wheel', function (event) {
                    if (event.ctrlKey) {
                        event.preventDefault();
                        if (event.deltaY < 0) {
                            setFontSize(currentFontSize + 1);
                        } else {
                            setFontSize(currentFontSize - 1);
                        }
                    }
                }, { passive: false });

                // ── Right-click paste (via C# host clipboard) ─────
                terminalElement.addEventListener('contextmenu', function (event) {
                    event.preventDefault();
                    postMessage('clipboard-read:');
                });

                // ── URL detection (basic regex) ─────────────────────
                // xterm.js 5.x has built-in link detection via registerLinkProvider
                // but we also handle via the linkHandler in options above

                window.writeTerminal = function (base64data) {
                    if (!term || !base64data) {
                        return;
                    }
                    term.write(base64ToBytes(base64data));
                };

                ready = true;
                postMessage('ready:' + term.cols + ',' + term.rows);
                flushPendingHostMessages();
                term.focus();

                new ResizeObserver(function () {
                    if (pendingResizeHandle) {
                        window.clearTimeout(pendingResizeHandle);
                    }
                    pendingResizeHandle = window.setTimeout(function () {
                        fitTerminal();
                    }, 60);
                }).observe(terminalElement);
            }

            // ── Search bar events ───────────────────────────────────
            document.getElementById('search-next').addEventListener('click', function () { doSearch('next'); });
            document.getElementById('search-prev').addEventListener('click', function () { doSearch('prev'); });
            document.getElementById('search-close').addEventListener('click', closeSearch);
            searchInput.addEventListener('keydown', function (event) {
                if (event.key === 'Enter') {
                    doSearch(event.shiftKey ? 'prev' : 'next');
                    event.preventDefault();
                }
                if (event.key === 'Escape') {
                    closeSearch();
                    event.preventDefault();
                }
            });

            // ── WebView2 message handler ────────────────────────────
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener('message', function (event) {
                    if (!ready) {
                        pendingHostMessages.push(event.data);
                        return;
                    }
                    handleHostMessage(event.data);
                });
            }

            initializeTerminal();
        }());
    </script>
</body>
</html>
