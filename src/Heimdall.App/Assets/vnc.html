<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heimdall VNC</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1E1E2E;
            color: #CDD6F4;
            font-family: 'Segoe UI', -apple-system, sans-serif;
        }

        #vnc-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #vnc-container canvas {
            max-width: 100%;
            max-height: 100%;
        }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1E1E2E;
            color: rgba(205, 214, 244, 0.72);
            font-size: 13px;
            letter-spacing: 0.02em;
            z-index: 10;
        }

        #error-panel {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
            background: #1E1E2E;
            z-index: 20;
        }

        #error-panel.visible {
            display: flex;
        }

        .error-content {
            text-align: center;
            max-width: 400px;
            padding: 24px;
        }

        .error-content h2 {
            color: #F38BA8;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .error-content p {
            color: rgba(205, 214, 244, 0.72);
            font-size: 13px;
        }

        /* Toolbar overlay */
        #vnc-toolbar {
            position: absolute;
            top: 4px;
            right: 12px;
            z-index: 100;
            display: flex;
            gap: 4px;
            background: rgba(30, 30, 46, 0.85);
            border: 1px solid #45475A;
            border-radius: 6px;
            padding: 4px 8px;
            align-items: center;
        }

        .toolbar-btn {
            background: #313244;
            color: #CDD6F4;
            border: 1px solid #45475A;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .toolbar-btn:hover {
            background: #45475A;
        }

        .toolbar-btn.active {
            background: #89B4FA;
            color: #1E1E2E;
            border-color: #89B4FA;
        }

        .toolbar-select {
            background: #313244;
            color: #CDD6F4;
            border: 1px solid #45475A;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div id="loading">Connecting to VNC server&#x2026;</div>
    <div id="error-panel">
        <div class="error-content">
            <h2 id="error-title">Connection Failed</h2>
            <p id="error-message"></p>
        </div>
    </div>
    <div id="vnc-toolbar">
        <button class="toolbar-btn" id="btn-clipboard" title="Sync clipboard">Clipboard</button>
        <select class="toolbar-select" id="select-scaling" title="Scaling mode">
            <option value="remote">Remote Resize</option>
            <option value="scale" selected>Scale</option>
            <option value="none">No Scaling</option>
        </select>
        <select class="toolbar-select" id="select-quality" title="Quality">
            <option value="0">Best Quality</option>
            <option value="3">Balanced</option>
            <option value="6" selected>Performance</option>
            <option value="9">Low Bandwidth</option>
        </select>
    </div>
    <div id="vnc-container"></div>

    <!--
        noVNC library loaded from local vendored copy (supply-chain safe).
        Vendored from https://github.com/novnc/noVNC v1.5.0
    -->
    <script type="module">
        var RFB;
        try {
            var module = await import('./vnc/core/rfb.js');
            RFB = module.default;
        } catch (importError) {
            document.getElementById('loading').style.display = 'none';
            var ep = document.getElementById('error-panel');
            document.getElementById('error-title').textContent = 'noVNC Library Unavailable';
            document.getElementById('error-message').textContent =
                'Failed to load the noVNC library. Ensure vnc/core/ folder is present alongside vnc.html. (' + importError.message + ')';
            ep.classList.add('visible');
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage('error:noVNC library failed to load: ' + importError.message);
            }
            throw importError;
        }

        (function () {
            'use strict';

            var loadingElement = document.getElementById('loading');
            var errorPanel = document.getElementById('error-panel');
            var errorTitle = document.getElementById('error-title');
            var errorMessage = document.getElementById('error-message');
            var container = document.getElementById('vnc-container');
            var btnClipboard = document.getElementById('btn-clipboard');
            var selectScaling = document.getElementById('select-scaling');
            var selectQuality = document.getElementById('select-quality');
            var rfb = null;

            function postMessage(message) {
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage(message);
                }
            }

            function showError(title, message) {
                loadingElement.style.display = 'none';
                errorTitle.textContent = title;
                errorMessage.textContent = message;
                errorPanel.classList.add('visible');
                postMessage('error:' + message);
            }

            function connect(wsUrl, password) {
                try {
                    rfb = new RFB(container, wsUrl, {
                        credentials: password ? { password: password } : undefined,
                        wsProtocols: ['binary']
                    });

                    rfb.scaleViewport = true;
                    rfb.resizeSession = false;
                    rfb.compressionLevel = 6;
                    rfb.showDotCursor = true;

                    rfb.addEventListener('connect', function () {
                        loadingElement.style.display = 'none';
                        postMessage('connected:');
                    });

                    rfb.addEventListener('disconnect', function (event) {
                        if (event.detail.clean) {
                            postMessage('disconnected:clean');
                        } else {
                            showError('Disconnected', 'The VNC connection was lost unexpectedly.');
                            postMessage('disconnected:error');
                        }
                    });

                    rfb.addEventListener('credentialsrequired', function () {
                        postMessage('credentials-required:');
                    });

                    rfb.addEventListener('clipboard', function (event) {
                        postMessage('clipboard-write:' + btoa(event.detail.text));
                    });

                    rfb.addEventListener('desktopname', function (event) {
                        postMessage('desktop-name:' + event.detail.name);
                    });

                } catch (ex) {
                    showError('Connection Error', ex.message || 'Failed to initialize VNC client.');
                }
            }

            // ---- Toolbar controls ----

            selectScaling.addEventListener('change', function () {
                if (!rfb) return;
                var mode = selectScaling.value;
                rfb.scaleViewport = (mode === 'scale');
                rfb.resizeSession = (mode === 'remote');
            });

            selectQuality.addEventListener('change', function () {
                if (!rfb) return;
                rfb.compressionLevel = parseInt(selectQuality.value, 10);
            });

            btnClipboard.addEventListener('click', function () {
                postMessage('clipboard-read:');
            });

            // ---- Host message handling ----

            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener('message', function (event) {
                    var msg = event.data;
                    if (typeof msg !== 'string') return;

                    if (msg.indexOf('connect:') === 0) {
                        var params = JSON.parse(msg.substring('connect:'.length));
                        connect(params.wsUrl, params.password || null);
                        return;
                    }

                    if (msg.indexOf('clipboard-paste:') === 0) {
                        var b64 = msg.substring('clipboard-paste:'.length);
                        if (rfb && b64) {
                            rfb.clipboardPasteFrom(atob(b64));
                        }
                        return;
                    }

                    if (msg === 'disconnect:') {
                        if (rfb) {
                            rfb.disconnect();
                            rfb = null;
                        }
                    }
                });

                postMessage('ready:');
            }
        }());
    </script>
</body>
</html>
